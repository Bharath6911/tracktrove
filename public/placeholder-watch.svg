<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#grad)"/>
  
  <!-- Watch circle -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#64748b" stroke-width="2"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#475569" stroke-width="1"/>
  
  <!-- Hour markers -->
  <line x1="100" y1="48" x2="100" y2="42" stroke="#94a3b8" stroke-width="2"/>
  <line x1="100" y1="152" x2="100" y2="158" stroke="#94a3b8" stroke-width="2"/>
  <line x1="152" y1="100" x2="158" y2="100" stroke="#94a3b8" stroke-width="2"/>
  <line x1="48" y1="100" x2="42" y2="100" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Hour hand -->
  <line x1="100" y1="100" x2="100" y2="70" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="100" y1="100" x2="115" y2="50" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="4" fill="#64748b"/>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle" font-weight="bold">
    TRACKTOVE
  </text>
</svg>
